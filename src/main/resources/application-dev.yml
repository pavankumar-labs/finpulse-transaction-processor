spring:
  datasource:
    url: jdbc:mysql://localhost:3306/finpulse_db?rewriteBatchedStatements=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    show-sql: true
  sql:
    init:
      mode: always


management:
  endpoint:
    health:
      show-details: always

