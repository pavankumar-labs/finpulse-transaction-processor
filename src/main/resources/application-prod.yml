
spring:
  datasource:
    url: jdbc:mysql://mysql-container:3306/finpulse_db?rewriteBatchedStatements=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  data:
    redis:
      host: redis-container
      port: 6379
  jpa:
    show-sql: false

management:
  endpoint:
    health:
      show-details: never
